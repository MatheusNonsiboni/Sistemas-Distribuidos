services:
  spark-master:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.1
    container_name: spark-master
    hostname: spark-master
    user: root
    entrypoint: ["/usr/local/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_MASTER_HOST=0.0.0.0
      - SPARK_MASTER_PORT=7077
      - SPARK_MASTER_WEBUI_PORT=8080
    ports:
      - "8080:8080"
      - "7077:7077"
    volumes:
      - ./notebooks:/opt/notebooks
      - ./dados:/opt/dados
      - ./output:/opt/output

  spark-worker-1:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.1
    container_name: spark-worker-1
    hostname: spark-worker-1
    user: root
    entrypoint: ["/usr/local/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    environment:
      - SPARK_NO_DAEMONIZE=true
      - SPARK_WORKER_MEMORY=2G
      - SPARK_WORKER_CORES=2
      - PYSPARK_PYTHON=/opt/conda/bin/python3
      - PYSPARK_DRIVER_PYTHON=/opt/conda/bin/python3
    ports:
      - "8081:8081"
    volumes:
      - ./notebooks:/opt/notebooks
      - ./dados:/opt/dados
      - ./output:/opt/output
    depends_on:
      - spark-master

  jupyter:
    image: quay.io/jupyter/pyspark-notebook:spark-3.5.1
    container_name: jupyter-spark
    user: root
    environment:
      - SPARK_MASTER=spark://spark-master:7077
      - JUPYTER_ENABLE_LAB=yes
    ports:
      - "8888:8888"
      - "4040:4040"
    volumes:
      - ./notebooks:/home/jovyan/work
      - ./dados:/opt/dados
      - ./output:/home/jovyan/output
      - ./output:/opt/output 
    depends_on:
      - spark-master